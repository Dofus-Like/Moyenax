# docker-compose.portainer.yml
# Stack deploye automatiquement via GitHub Actions CI/CD.
# Ne pas modifier manuellement — les changements seront ecrases au prochain push sur main.
#
# Sous-domaines :
#   API : https://moyenax-api.roketlab.duckdns.org
#   Web : https://moyenax.roketlab.duckdns.org

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${STACK_CONTAINER_PREFIX:-moyenax}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: game_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # On s'assure que postgres accepte vraiment les requetes (pas juste pg_isready)
      # pour eviter de demarrer api-setup pendant une recovery WAL post-restart
      test: ["CMD-SHELL", "pg_isready -U game_user -d game_db && psql -U game_user -d game_db -c 'SELECT 1' -q"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - moyenax-network

  redis:
    image: redis:7-alpine
    container_name: ${STACK_CONTAINER_PREFIX:-moyenax}-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moyenax-network

  api-setup:
    image: ghcr.io/roketag33/moyenax-api:${IMAGE_TAG:-latest}
    container_name: ${STACK_CONTAINER_PREFIX:-moyenax}-api-setup
    restart: "no"
    # Migrations uniquement — pas de set -e fragile, pas de scripts inline complexes.
    # Le seed est gere separement si besoin (la DB est deja initialisee en prod).
    command:
      - node
      - scripts/api-setup.cjs
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://game_user:${POSTGRES_PASSWORD}@postgres:5432/game_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - moyenax-network

  api:
    image: ghcr.io/roketag33/moyenax-api:${IMAGE_TAG:-latest}
    container_name: ${STACK_CONTAINER_PREFIX:-moyenax}-api
    restart: unless-stopped
    command:
      - node
      - dist/main.js
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://game_user:${POSTGRES_PASSWORD}@postgres:5432/game_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://moyenax.roketlab.duckdns.org}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(3000).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - moyenax-network
      - proxy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-api.rule=Host(`${API_HOST:-moyenax-api.roketlab.duckdns.org}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-api.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-api.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-api.tls.certresolver=le"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-api.service=${TRAEFIK_ROUTER_PREFIX:-moyenax}-api"
      - "traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-moyenax}-api.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"

  web:
    image: ghcr.io/roketag33/moyenax-web:${IMAGE_TAG:-latest}
    container_name: ${STACK_CONTAINER_PREFIX:-moyenax}-web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - moyenax-network
      - proxy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-web.rule=Host(`${WEB_HOST:-moyenax.roketlab.duckdns.org}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-web.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-web.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-web.tls.certresolver=le"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-moyenax}-web.service=${TRAEFIK_ROUTER_PREFIX:-moyenax}-web"
      - "traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-moyenax}-web.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  moyenax-network:
    name: ${APP_NETWORK_NAME:-moyenax-network}
    driver: bridge
  proxy:
    external: true
