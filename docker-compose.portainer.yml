# docker-compose.portainer.yml
# Stack deployee automatiquement via GitHub Actions.
# Ne pas modifier manuellement dans Portainer : le prochain deploiement ecrasera ces changements.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: game_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # On s'assure que postgres accepte vraiment les requetes (pas juste pg_isready)
      # pour eviter de demarrer api-setup pendant une recovery WAL post-restart
      test: ["CMD-SHELL", "pg_isready -U game_user -d game_db && psql -U game_user -d game_db -c 'SELECT 1' -q"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dofus-like-network

  redis:
    image: redis:7-alpine
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dofus-like-network

  api-setup:
    image: ${API_IMAGE:-ghcr.io/roketag33/dofus-like-api}:${IMAGE_TAG:-latest}
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-api-setup
    restart: "no"
    # Migrations uniquement — pas de set -e fragile, pas de scripts inline complexes.
    # Le seed est gere separement si besoin (la DB est deja initialisee en prod).
    command:
      - node
      - scripts/api-setup.cjs
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://game_user:${POSTGRES_PASSWORD}@postgres:5432/game_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dofus-like-network

  api:
    image: ${API_IMAGE:-ghcr.io/roketag33/dofus-like-api}:${IMAGE_TAG:-latest}
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-api
    restart: unless-stopped
    command:
      - node
      - dist/main.js
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://game_user:${POSTGRES_PASSWORD}@postgres:5432/game_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://dofus-like.roketlab.duckdns.org}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/v1/health').then((response)=>process.exit(response.ok ? 0 : 1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dofus-like-network
      - proxy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.rule=Host(`${API_HOST:-dofus-like-api.roketlab.duckdns.org}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.tls.certresolver=le"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.service=${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api"
      - "traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"

  web:
    image: ${WEB_IMAGE:-ghcr.io/roketag33/dofus-like-web}:${IMAGE_TAG:-latest}
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dofus-like-network
      - proxy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.rule=Host(`${WEB_HOST:-dofus-like.roketlab.duckdns.org}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.tls.certresolver=le"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.service=${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web"
      - "traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dofus-like-network:
    name: ${APP_NETWORK_NAME:-dofus-like-network}
    driver: bridge
  proxy:
    external: true
