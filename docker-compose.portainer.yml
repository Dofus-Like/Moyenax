#
# dofus-like-portainer-stack
# ---------------------------
# Ne pas modifier manuellement — les changements seront ecrases au prochain push sur main.
#
# Sous-domaines :
#   API : https://dofus-like-api.roketlab.duckdns.org
#   Web : https://dofus-like.roketlab.duckdns.org

services:
  postgres:
    image: postgres:15-alpine
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: game_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-game_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game_user -d game_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dofus-like-network

  redis:
    image: redis:7-alpine
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dofus-like-network

  api-setup:
    image: ghcr.io/roketag33/dofus-like-api:${IMAGE_TAG:-latest}
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-api-setup
    restart: "no"
    # Migrations uniquement — pas de set -e fragile, pas de scripts inline complexes.
    # Le seed est gere separement si besoin (la DB est deja initialisee en prod).
    command:
      - npx
      - prisma
      - migrate
      - deploy
      - --schema=apps/api/prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://game_user:${POSTGRES_PASSWORD:-game_password}@postgres:5432/game_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dofus-like-network

  api:
    image: ghcr.io/roketag33/dofus-like-api:${IMAGE_TAG:-latest}
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-api
    restart: unless-stopped
    command:
      - node
      - dist/apps/api/main.js
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://game_user:${POSTGRES_PASSWORD:-game_password}@postgres:5432/game_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://dofus-like.roketlab.duckdns.org}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api-setup:
        condition: service_completed
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dofus-like-network
      - proxy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.rule=Host(`${API_HOST:-dofus-like-api.roketlab.duckdns.org}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.tls.certresolver=le"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.service=${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api"
      - "traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-api.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"

  web:
    image: ghcr.io/roketag33/dofus-like-web:${IMAGE_TAG:-latest}
    container_name: ${STACK_CONTAINER_PREFIX:-dofus-like}-web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - dofus-like-network
      - proxy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.rule=Host(`${WEB_HOST:-dofus-like.roketlab.duckdns.org}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.tls.certresolver=le"
      - "traefik.http.routers.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.service=${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web"
      - "traefik.http.services.${TRAEFIK_ROUTER_PREFIX:-dofus-like}-web.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dofus-like-network:
    name: ${APP_NETWORK_NAME:-dofus-like-network}
    driver: bridge
  proxy:
    external: true
