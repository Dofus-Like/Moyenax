name: Deploy

# Triggers:
#   - push to dev  → deploy to test
#   - push to main → deploy to production
#   - manual dispatch → choose target
on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deployment target"
        type: choice
        options:
          - test
          - production
        default: test
      stack_name_override:
        description: "Optional exact Portainer stack name"
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write # requis par _quality-gates.yml (sticky PR comment)

# Prevent parallel deploys to the same environment.
# Prod deploys are NEVER cancelled — test deploys can be superseded by a newer commit.
concurrency:
  group: deploy-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  resolve-context:
    name: Resolve deployment context
    runs-on: ubuntu-latest
    outputs:
      environment_name: ${{ steps.context.outputs.environment_name }}
      stable_tag: ${{ steps.context.outputs.stable_tag }}
      build_time: ${{ steps.context.outputs.build_time }}

    steps:
      - name: Resolve deployment target
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            case "${{ github.ref_name }}" in
              main)
                environment_name="production"
                ;;
              dev)
                environment_name="test"
                ;;
              *)
                echo "::error::Unsupported branch for deployment: ${{ github.ref_name }}"
                exit 1
                ;;
            esac
          else
            environment_name="${{ inputs.deploy_target }}"
          fi

          if [[ "$environment_name" == "production" && "${{ github.ref_name }}" != "main" ]]; then
            echo "::error::Production deployments must run from main."
            exit 1
          fi

          if [[ "$environment_name" == "production" ]]; then
            stable_tag="latest"
          else
            stable_tag="dev"
          fi

          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "environment_name=$environment_name" >> "$GITHUB_OUTPUT"
          echo "stable_tag=$stable_tag" >> "$GITHUB_OUTPUT"
          echo "build_time=$build_time" >> "$GITHUB_OUTPUT"

          {
            echo "### Deployment context"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Target environment | \`$environment_name\` |"
            echo "| Stable tag | \`$stable_tag\` |"
            echo "| Commit SHA | \`${{ github.sha }}\` |"
            echo "| Build time | \`$build_time\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  quality-gates:
    name: Quality gates
    uses: ./.github/workflows/_quality-gates.yml

  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - resolve-context
      - quality-gates
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}
      api_image: ${{ steps.images.outputs.api_image }}
      web_image: ${{ steps.images.outputs.web_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve registry image names
        id: images
        shell: bash
        env:
          GHCR_NAMESPACE_OVERRIDE: ${{ vars.GHCR_NAMESPACE }}
          GHCR_IMAGE_PREFIX_OVERRIDE: ${{ vars.GHCR_IMAGE_PREFIX }}
        run: |
          set -euo pipefail

          namespace="${GHCR_NAMESPACE_OVERRIDE:-roketag33}"
          image_prefix="${GHCR_IMAGE_PREFIX_OVERRIDE:-dofus-like}"

          namespace="$(echo "$namespace" | tr '[:upper:]' '[:lower:]')"
          image_prefix="$(echo "$image_prefix" | tr '[:upper:]' '[:lower:]')"

          echo "api_image=ghcr.io/${namespace}/${image_prefix}-api" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${namespace}/${image_prefix}-web" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME || 'roketag33' }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "api_tags<<EOF"
            echo "${{ steps.images.outputs.api_image }}:${{ github.sha }}"
            echo "${{ steps.images.outputs.api_image }}:${{ needs.resolve-context.outputs.stable_tag }}"
            echo "EOF"
            echo "web_tags<<EOF"
            echo "${{ steps.images.outputs.web_image }}:${{ github.sha }}"
            echo "${{ steps.images.outputs.web_image }}:${{ needs.resolve-context.outputs.stable_tag }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # BUILD_SHA/BUILD_TIME are baked into the images so the running containers
      # can report which revision they are on. The deploy smoke check uses this
      # to verify the new version is actually serving traffic before declaring
      # success (prevents the false-green "old containers still responding" bug).
      - name: Build & push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ needs.resolve-context.outputs.build_time }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.web_tags }}
          build-args: |
            VITE_API_URL=/api/v1
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ needs.resolve-context.outputs.build_time }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  verify-manifests:
    name: Wait for GHCR manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME || 'roketag33' }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Wait until manifests are available
        shell: bash
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          set -euo pipefail

          wait_for_manifest() {
            local image_ref="$1"

            for attempt in $(seq 1 12); do
              if docker buildx imagetools inspect "$image_ref" >/dev/null 2>&1; then
                echo "Manifest ready: $image_ref"
                return 0
              fi

              echo "Manifest not ready yet for $image_ref (attempt $attempt/12)"
              sleep 10
            done

            echo "::error::Manifest never became available for $image_ref"
            return 1
          }

          wait_for_manifest "${API_IMAGE}:${IMAGE_TAG}"
          wait_for_manifest "${WEB_IMAGE}:${IMAGE_TAG}"

  deploy:
    name: Deploy stack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - resolve-context
      - build-and-push
      - verify-manifests
    environment: ${{ needs.resolve-context.outputs.environment_name }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve stack endpoints
        id: stack
        shell: bash
        env:
          BASE_DOMAIN_OVERRIDE: ${{ vars.BASE_DOMAIN }}
          STACK_NAME_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.stack_name_override || '' }}
          PORTAINER_STACK_NAME_BASE: ${{ secrets.PORTAINER_STACK_NAME }}
          PORTAINER_TEST_STACK_NAME_OVERRIDE: ${{ vars.PORTAINER_TEST_STACK_NAME }}
          TARGET_ENV: ${{ needs.resolve-context.outputs.environment_name }}
        run: |
          set -euo pipefail

          if [[ -z "${PORTAINER_STACK_NAME_BASE}" ]]; then
            echo "::error::Missing required secret PORTAINER_STACK_NAME"
            exit 1
          fi

          base_domain="${BASE_DOMAIN_OVERRIDE:-roketlab.duckdns.org}"

          if [[ -n "${STACK_NAME_OVERRIDE}" ]]; then
            stack_name="${STACK_NAME_OVERRIDE}"
          elif [[ "${TARGET_ENV}" == "test" && -n "${PORTAINER_TEST_STACK_NAME_OVERRIDE}" ]]; then
            stack_name="${PORTAINER_TEST_STACK_NAME_OVERRIDE}"
          elif [[ "${TARGET_ENV}" == "test" ]]; then
            stack_name="${PORTAINER_STACK_NAME_BASE}-test"
          else
            stack_name="${PORTAINER_STACK_NAME_BASE}"
          fi

          stack_container_prefix="$(echo "${stack_name}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')"
          api_host="${stack_container_prefix}-api.${base_domain}"
          web_host="${stack_container_prefix}.${base_domain}"

          echo "stack_name=${stack_name}" >> "$GITHUB_OUTPUT"
          echo "stack_container_prefix=${stack_container_prefix}" >> "$GITHUB_OUTPUT"
          echo "api_host=${api_host}" >> "$GITHUB_OUTPUT"
          echo "web_host=${web_host}" >> "$GITHUB_OUTPUT"
          echo "app_network_name=${stack_container_prefix}-network" >> "$GITHUB_OUTPUT"
          echo "frontend_url=https://${web_host}" >> "$GITHUB_OUTPUT"
          echo "smoke_api_url=https://${api_host}/api/v1/health" >> "$GITHUB_OUTPUT"
          echo "smoke_web_url=https://${web_host}" >> "$GITHUB_OUTPUT"

      - name: Deploy stack via Portainer API
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_TOKEN: ${{ secrets.PORTAINER_API_TOKEN }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          PORTAINER_COMPOSE_FILE: docker-compose.portainer.yml
          STACK_NAME: ${{ steps.stack.outputs.stack_name }}
          STACK_CONTAINER_PREFIX: ${{ steps.stack.outputs.stack_container_prefix }}
          TRAEFIK_ROUTER_PREFIX: ${{ steps.stack.outputs.stack_container_prefix }}
          API_HOST: ${{ steps.stack.outputs.api_host }}
          WEB_HOST: ${{ steps.stack.outputs.web_host }}
          APP_NETWORK_NAME: ${{ steps.stack.outputs.app_network_name }}
          FRONTEND_URL: ${{ steps.stack.outputs.frontend_url }}
          SMOKE_API_URL: ${{ steps.stack.outputs.smoke_api_url }}
          SMOKE_WEB_URL: ${{ steps.stack.outputs.smoke_web_url }}
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          EXPECTED_BUILD_SHA: ${{ github.sha }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # Prod gets automatic rollback on smoke failure; test doesn't, so developers
          # can inspect the broken state and fix forward.
          ROLLBACK_ON_FAILURE: ${{ needs.resolve-context.outputs.environment_name == 'production' && 'true' || 'false' }}
        run: node scripts/ci/portainer-deploy.mjs

      - name: Deployment summary
        if: always()
        shell: bash
        env:
          TARGET_ENV: ${{ needs.resolve-context.outputs.environment_name }}
          STACK_NAME: ${{ steps.stack.outputs.stack_name }}
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SMOKE_API_URL: ${{ steps.stack.outputs.smoke_api_url }}
          SMOKE_WEB_URL: ${{ steps.stack.outputs.smoke_web_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "### Deploy result: \`$JOB_STATUS\`"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`$TARGET_ENV\` |"
            echo "| Stack | \`$STACK_NAME\` |"
            echo "| Commit SHA | \`${{ github.sha }}\` |"
            echo "| API image | \`$API_IMAGE:$IMAGE_TAG\` |"
            echo "| Web image | \`$WEB_IMAGE:$IMAGE_TAG\` |"
            echo "| Web URL | $SMOKE_WEB_URL |"
            echo "| API health | $SMOKE_API_URL |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Target  : $TARGET_ENV"
          echo "Stack   : $STACK_NAME"
          echo "API     : $API_IMAGE:$IMAGE_TAG"
          echo "Web     : $WEB_IMAGE:$IMAGE_TAG"
          echo "URL API : $SMOKE_API_URL"
          echo "URL Web : $SMOKE_WEB_URL"
