services:
  postgres:
    container_name: dofus-like-postgres-ci-local
    ports:
      - "${CI_LOCAL_POSTGRES_PORT:-15432}:5432"

  redis:
    container_name: dofus-like-redis-ci-local
    ports:
      - "${CI_LOCAL_REDIS_PORT:-16379}:6379"

  api-setup:
    image: ${CI_LOCAL_API_IMAGE:-dofus-like-api:ci-local}
    container_name: dofus-like-api-setup-ci-local

  api:
    image: ${CI_LOCAL_API_IMAGE:-dofus-like-api:ci-local}
    container_name: dofus-like-api-ci-local
    ports:
      - "${CI_LOCAL_API_PORT:-13000}:3000"
    networks:
      - dofus-like-network
    labels: []

  web:
    image: ${CI_LOCAL_WEB_IMAGE:-dofus-like-web:ci-local}
    container_name: dofus-like-web-ci-local
    ports:
      - "${CI_LOCAL_WEB_PORT:-18080}:80"
    networks:
      - dofus-like-network
    labels: []

networks:
  dofus-like-network:
    name: dofus-like-ci-local-network
    driver: bridge
  proxy:
    name: dofus-like-ci-local-proxy
    driver: bridge
    external: false
